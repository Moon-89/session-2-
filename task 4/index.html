<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>My To-Do List</h1>
      <p class="app__subtitle">Stay organized, get things done.</p>
    </header>

    <form id="task-form" class="task-form" autocomplete="off">
      <input
        type="text"
        id="task-input"
        class="task-form__input"
        placeholder="What needs to be done?"
        maxlength="200"
        required
      />
      <button type="submit" class="btn btn--add">Add</button>
    </form>

    <div class="toolbar">
      <div class="filters" role="tablist" aria-label="Filter tasks">
        <button class="filter is-active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed" class="btn btn--ghost">Clear completed</button>
    </div>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-state" class="empty-state">No tasks yet. Add your first one above!</p>

    <footer class="app__footer">
      <span id="task-count">0 tasks left</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
